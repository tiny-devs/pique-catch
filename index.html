<!doctype html>
<html>
<head>
  <title>Pique Catch — Online</title>
  <meta name="viewport" content="initial-scale=1.0" />
  <style>
    html, body {
      background-color: #232426;
      margin: 0;
      height: 100%;
      font-family: -apple-system, Segoe UI, Roboto, sans-serif;
      color: #f0f0f0;
    }
    canvas { display: block; margin: 0 auto; }
    #game { display: none; }

    #login {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: radial-gradient(circle at 50% 35%, #2e2e30, #1a1b1c);
    }
    #login h1 {
      margin: 0;
      font-size: 42px;
      letter-spacing: 2px;
      color: #66c64b;
      text-shadow: 0 3px 0 #1f5a17;
    }
    #login p { margin: 0; opacity: 0.7; font-size: 14px; }
    #nick {
      width: 280px;
      padding: 14px 16px;
      font-size: 18px;
      text-align: center;
      border: 2px solid #66c64b;
      border-radius: 8px;
      background: #18191a;
      color: #fff;
      outline: none;
    }
    #play {
      width: 280px;
      padding: 14px 16px;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      background: #66c64b;
      color: #10240b;
      cursor: pointer;
      transition: transform 0.05s ease, background 0.15s ease;
    }
    #play:hover { background: #74da57; }
    #play:active { transform: translateY(2px); }
    #hint { font-size: 12px; opacity: 0.55; }
  </style>
</head>
<body>
  <div id="login">
    <h1>PIQUE CATCH</h1>
    <p>Servidor global — todo mundo joga junto</p>
    <input id="nick" maxlength="16" placeholder="Digite seu nickname" autocomplete="off" autofocus />
    <button id="play">ENTRAR</button>
    <span id="hint">Mover: A / D &nbsp;·&nbsp; Pular: W ou Espaço</span>
  </div>

  <div id="game"></div>

  <script type="module" src="/src/index.ts"></script>
  <script>
    (function () {
      var input = document.getElementById('nick');
      var button = document.getElementById('play');
      var login = document.getElementById('login');
      var game = document.getElementById('game');

      function start() {
        var name = (input.value || '').trim();
        if (!name) { input.focus(); return; }
        login.style.display = 'none';
        game.style.display = 'block';
        // startGame is exposed by the bundle (src/index.ts).
        window.startGame(name);
      }

      button.addEventListener('click', start);
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') start();
      });
    })();
  </script>
</body>
</html>
